<div class="custom-select" [class.open]="isOpen" [class.error]="hasError">
  <div class="select-trigger" (click)="toggle()">
    @if (selectedLabel) {
      <span class="select-value">{{ selectedLabel }}</span>
    } @else {
      <span class="select-placeholder">{{ placeholder }}</span>
    }
    <svg class="select-arrow" [class.rotated]="isOpen"
      width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M4 6l4 4 4-4" stroke="#94a3b8" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  @if (isOpen) {
    <div class="select-dropdown">
  @for (option of options; track option.value) {
    <div class="select-option"
      [class.selected]="option.value === value"
      (click)="select(option)">
      {{ option.label }}
      @if (option.value === value) {
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7l4 4 6-6" stroke="#7c3aed" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      }
    </div>
  }
</div>
  }
</div>
