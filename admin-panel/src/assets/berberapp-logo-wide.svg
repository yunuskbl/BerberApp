<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    <linearGradient id="poleGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#f3f4f6"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <clipPath id="poleClip2">
      <rect x="27" y="10" width="10" height="60" rx="5"/>
    </clipPath>
  </defs>

  <!-- Icon background circle -->
  <circle cx="40" cy="40" r="36" fill="url(#bgGrad2)"/>
  <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Barber pole -->
  <rect x="27" y="10" width="10" height="60" rx="5" fill="url(#poleGrad2)"/>
  <g clip-path="url(#poleClip2)">
    <line x1="18" y1="2"  x2="46" y2="30"  stroke="#ef4444" stroke-width="4" opacity="0.9"/>
    <line x1="18" y1="16" x2="46" y2="44"  stroke="#ef4444" stroke-width="4" opacity="0.9"/>
    <line x1="18" y1="30" x2="46" y2="58"  stroke="#ef4444" stroke-width="4" opacity="0.9"/>
    <line x1="18" y1="44" x2="46" y2="72"  stroke="#ef4444" stroke-width="4" opacity="0.9"/>
    <line x1="18" y1="58" x2="46" y2="86"  stroke="#ef4444" stroke-width="4" opacity="0.9"/>
  </g>
  <!-- Caps -->
  <ellipse cx="32" cy="10" rx="6" ry="2.5" fill="#7c3aed"/>
  <ellipse cx="32" cy="70" rx="6" ry="2.5" fill="#5b21b6"/>

  <!-- Scissors (top-right of icon) -->
  <g transform="translate(52, 26) rotate(30)" opacity="0.95">
    <path d="M0,0 Q8,-3 13,-1 Q10,2 0,0Z" fill="white"/>
    <circle cx="0" cy="0" r="2.2" fill="white" stroke="#7c3aed" stroke-width="0.8"/>
    <path d="M0,0 Q8,3 13,1 Q10,-2 0,0Z" fill="white"/>
    <circle cx="0" cy="0" r="1.1" fill="#7c3aed"/>
    <ellipse cx="-4" cy="-3.5" rx="2.2" ry="3" fill="none" stroke="white" stroke-width="1.2" transform="rotate(-15,-4,-3.5)"/>
    <ellipse cx="-4" cy="3.5"  rx="2.2" ry="3" fill="none" stroke="white" stroke-width="1.2" transform="rotate(15,-4,3.5)"/>
  </g>

  <!-- Comb (bottom-left of icon) -->
  <g transform="translate(18, 46)" opacity="0.9">
    <rect x="-2.5" y="-11" width="5" height="22" rx="1.5" fill="white"/>
    <rect x="-1.5" y="-10" width="2" height="6" rx="1" fill="rgba(124,58,237,0.35)"/>
    <rect x="0.5"  y="-10" width="2" height="6" rx="1" fill="rgba(124,58,237,0.35)"/>
    <rect x="-1.5" y="-1"  width="2" height="6" rx="1" fill="rgba(124,58,237,0.35)"/>
    <rect x="0.5"  y="-1"  width="2" height="6" rx="1" fill="rgba(124,58,237,0.35)"/>
  </g>

  <!-- App name text -->
  <text x="90" y="46" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="30" font-weight="700" letter-spacing="-0.5"
        fill="#1e1b4b">Berber</text>
  <text x="199" y="46" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="30" font-weight="300" letter-spacing="-0.5"
        fill="#7c3aed">App</text>

  <!-- Tagline -->
  <text x="91" y="62" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="400" letter-spacing="2"
        fill="#6b7280">RANDEVU YÖNETİMİ</text>
</svg>
